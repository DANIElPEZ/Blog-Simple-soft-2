<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Blog App</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
}

h1 {
    text-align: center;
}

form {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}

.post {
    background: white;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
}

.actions {
    margin-top: 10px;
}

.actions button {
    margin-right: 10px;
    background: #28a745;
}

.actions button:last-child {
    background: #dc3545;
}
</style>

</head>
<body>

<div class="container">
    <h1>Blog</h1>

    <form id="postForm">
        <input type="hidden" id="postId">

        <input type="text" id="author" placeholder="Tu nombre" required>
        <input type="text" id="title" placeholder="Título" required>
        <textarea id="content" placeholder="Contenido" required></textarea>

        <button type="submit">Guardar</button>
    </form>

    <div id="postList"></div>
</div>

<script src="frontend.js"></script>

</body>
</html>
