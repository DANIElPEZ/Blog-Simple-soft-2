<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blog</title>
</head>
<body>

    <form id="postForm">

    <div id="postList"></div>

    <script src="frontend.js"></script>
</body>
</html>
