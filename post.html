<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lectura del Post</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; line-height: 1.6; }
        .post-detail { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .back-link { display: inline-block; margin-bottom: 20px; color: #1877f2; text-decoration: none; font-weight: bold; }
        h1 { margin-top: 0; color: #1c1e21; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .meta { color: #65676b; margin-bottom: 30px; display: block; }
        .content { font-size: 1.1em; color: #333; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="post-detail">
    <a href="index.html" class="back-link">← Volver al inicio</a>
    <h1 id="detTitle">Cargando...</h1>
    <span class="meta">Autor: <b id="detAuthor">...</b></span>
    <div id="detContent" class="content"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    async function loadDetail() {
        try {
            const res = await fetch(`http://localhost:3000/posts/${postId}`);
            const post = await res.json();
            
            if (!post) {
                document.getElementById('detTitle').innerText = "Post no encontrado";
                return;
            }

            document.getElementById('detTitle').innerText = post.title;
            document.getElementById('detAuthor').innerText = post.author_name;
            document.getElementById('detContent').innerText = post.content;
            document.title = post.title;
        } catch (e) {
            console.error(e);
        }
    }

    if(postId) loadDetail();
</script>
</body>
</html>
